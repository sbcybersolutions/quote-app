{% extends "base.html" %}

{% block title %}Quote Started{% endblock %}

{% block content %}
  <div class="alert alert-success">
    <strong>Success!</strong> Quote started for client: <strong>{{ client }}</strong>.
  </div>
  <p>You can now add project types, costs, and export the quote.</p>

  <a class="btn btn-success mt-3" href="{{ url_for('main.add_quote_item', quote_id=quote_id) }}">
  + Add Items to This Quote
</a>

{% endblock %}
