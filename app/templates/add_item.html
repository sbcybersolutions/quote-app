{% extends "base.html" %}

{% block title %}Add Item to Quote{% endblock %}

{% block content %}
  <h1 class="mb-3">Add Item to Quote #{{ quote.id }}</h1>

  <form method="post">
    <div class="row mb-3">
      <div class="col-md-3">
        <label class="form-label">Project Type</label>
        <select class="form-select" name="project_type" required>
          <option value="">-- Choose --</option>
          {% for pt in project_types %}
            <option value="{{ pt.id }}">{{ pt.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="col-md-2">
        <label class="form-label">Quantity</label>
        <input type="number" class="form-control" name="quantity" min="1" required>
      </div>

      <div class="col-md-4">
        <label class="form-label">Detail</label>
        <input type="text" class="form-control" name="custom_label" placeholder="Optional description">
      </div>

      <div class="col-md-3" id="video-options" style="display: none;">
        <label class="form-label">Video Type</label>
        <select class="form-select" name="video_type_id">
          <option value="">-- Choose --</option>
          {% for vt in video_types %}
            <option value="{{ vt.id }}">{{ vt.name }}</option>
          {% endfor %}
        </select>
        <label class="form-label mt-2">Video Length (seconds)</label>
        <input type="number" class="form-control" name="video_seconds" min="0">
      </div>
    </div>

    <button type="submit" class="btn btn-primary">Add Item</button>
    <a href="{{ url_for('main.quote_detail', quote_id=quote.id) }}" class="btn btn-secondary">Cancel</a>
  </form>

  <script>
    const projectTypeSelect = document.querySelector('[name="project_type"]');
    const videoOptions = document.getElementById('video-options');

    function toggleVideoOptions() {
      const selectedText = projectTypeSelect.selectedOptions[0]?.text.toLowerCase();
      videoOptions.style.display = selectedText.includes("video") ? 'block' : 'none';
    }

    projectTypeSelect.addEventListener('change', toggleVideoOptions);
    toggleVideoOptions(); // Run on load
  </script>
{% endblock %}
